<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click for a Prayer</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@400;600;700&family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #fff6df, #f7ead3, #ead7b8);
  font-family: Poppins, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 22px;
  color: #2d261c;
  overflow: hidden;
}

.card {
  width: 100%;
  max-width: 720px;
  text-align: center;
  padding: 34px 24px;
  border-radius: 30px;
  background: rgba(255, 252, 244, 0.88);
  border: 2px solid rgba(196, 155, 63, 0.45);
  box-shadow: 0 18px 50px rgba(83, 55, 20, 0.18);
  position: relative;
  z-index: 2;
}

.ikonkar {
  font-family: "Noto Sans Gurmukhi", sans-serif;
  font-size: 58px;
  color: #b88918;
  margin-bottom: 6px;
}

h1 {
  font-family: "Cormorant Garamond", serif;
  font-size: 46px;
  color: #11233f;
  letter-spacing: 1px;
}

.subtitle {
  margin: 10px 0 26px;
  font-size: 15px;
  opacity: 0.75;
}

button {
  border: none;
  border-radius: 999px;
  padding: 16px 32px;
  background: linear-gradient(135deg, #c99b2b, #e1bd5b);
  color: white;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(166, 121, 26, 0.28);
}

button:active {
  transform: scale(0.97);
}

.prayerBox {
  margin-top: 30px;
  min-height: 300px;
  opacity: 0;
  transform: translateY(14px);
  transition: 0.6s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

.punjabi {
  font-family: "Noto Sans Gurmukhi", sans-serif;
  font-size: 24px;
  line-height: 1.8;
  color: #111f38;
  margin-bottom: 20px;
}

.english {
  font-size: 18px;
  line-height: 1.8;
  color: #3d3328;
}

.divider {
  width: 110px;
  height: 1px;
  background: #c99b2b;
  margin: 18px auto;
}

.footer {
  margin-top: 26px;
  font-size: 13px;
  letter-spacing: 1px;
  opacity: 0.65;
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #d6aa35;
  border-radius: 50%;
  opacity: 0.45;
  animation: float linear infinite;
}

@keyframes float {
  from {
    transform: translateY(110vh);
    opacity: 0;
  }
  25% {
    opacity: 0.5;
  }
  75% {
    opacity: 0.5;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="ikonkar">ੴ</div>
  <h1>Click for a Prayer</h1>
  <div class="subtitle">Take a quiet moment with Waheguru.</div>

  <button onclick="newPrayer()">🙏 Read a Prayer</button>

  <div id="prayerBox" class="prayerBox"></div>

  <div class="footer">
    WAHEGURU JI KA KHALSA • WAHEGURU JI KI FATEH
  </div>
</div>

<script>
const prayers = [
  {
    punjabi: `ਵਾਹਿਗੁਰੂ ਜੀ,<br>ਮੇਰੇ ਮਨ ਨੂੰ ਸ਼ਾਂਤੀ ਬਖ਼ਸ਼ੋ।<br>ਮੇਰੇ ਬੋਲਾਂ ਵਿੱਚ ਮਿੱਠਾਸ ਅਤੇ ਮੇਰੇ ਕਰਮਾਂ ਵਿੱਚ ਦਇਆ ਰੱਖੋ।`,
    english: `Waheguru Ji,<br>Grant peace to my mind.<br>Keep sweetness in my words and kindness in my actions.`
  },
  {
    punjabi: `ਵਾਹਿਗੁਰੂ ਜੀ,<br>ਮੇਰੇ ਪਰਿਵਾਰ ਨੂੰ ਸਿਹਤ, ਪਿਆਰ ਅਤੇ ਚੜ੍ਹਦੀ ਕਲਾ ਬਖ਼ਸ਼ੋ।<br>ਸਾਨੂੰ ਹਮੇਸ਼ਾ ਇਕ ਦੂਜੇ ਦਾ ਸਹਾਰਾ ਬਣਾਓ।`,
    english: `Waheguru Ji,<br>Bless my family with health, love, and Chardi Kala.<br>Help us always support one another.`
  },
  {
    punjabi: `ਵਾਹਿਗੁਰੂ ਜੀ,<br>ਜਦੋਂ ਮੈਂ ਚਿੰਤਾ ਵਿੱਚ ਹਾਂ, ਮੈਨੂੰ ਭਰੋਸਾ ਬਖ਼ਸ਼ੋ।<br>ਜਦੋਂ ਮੈਂ ਕਮਜ਼ੋਰ ਮਹਿਸੂਸ ਕਰਾਂ, ਮੈਨੂੰ ਹੌਸਲਾ ਦਿਓ।`,
    english: `Waheguru Ji,<br>When I feel worried, give me faith.<br>When I feel weak, give me strength.`
  },
  {
    punjabi: `ਵਾਹਿਗੁਰੂ ਜੀ,<br>ਅੱਜ ਦੇ ਦਿਨ ਲਈ ਸ਼ੁਕਰਾਨਾ।<br>ਮੈਨੂੰ ਸੇਵਾ, ਨਿਮਰਤਾ ਅਤੇ ਸੱਚ ਦੇ ਰਾਹ ਤੇ ਚਲਾਓ।`,
    english: `Waheguru Ji,<br>Thank You for this day.<br>Guide me on the path of service, humility, and truth.`
  },
  {
    punjabi: `ਵਾਹਿਗੁਰੂ ਜੀ,<br>ਮੇਰੇ ਦਿਲ ਵਿੱਚ ਦਇਆ ਭਰੋ।<br>ਮੇਰੀ ਸੋਚ ਨੂੰ ਸਾਫ਼ ਅਤੇ ਮੇਰੇ ਕਦਮਾਂ ਨੂੰ ਸਹੀ ਰਾਹ ਤੇ ਰੱਖੋ।`,
    english: `Waheguru Ji,<br>Fill my heart with compassion.<br>Keep my thoughts clear and my steps on the right path.`
  }
];

function newPrayer() {
  const box = document.getElementById("prayerBox");
  box.classList.remove("show");

  setTimeout(() => {
    const prayer = prayers[Math.floor(Math.random() * prayers.length)];
    box.innerHTML = `
      <div class="punjabi">${prayer.punjabi}</div>
      <div class="divider"></div>
      <div class="english">${prayer.english}</div>
    `;
    box.classList.add("show");
  }, 250);
}

for (let i = 0; i < 35; i++) {
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = 8 + Math.random() * 10 + "s";
  s.style.animationDelay = Math.random() * 8 + "s";
  document.body.appendChild(s);
}
</script>

</body>
</html>
